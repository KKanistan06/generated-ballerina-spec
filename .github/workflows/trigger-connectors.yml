name: Generate Connectors After Spec Merge

on:
  pull_request:
    types: [closed]

jobs:
  generate-connectors:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Extract dataset key
      # =========================
      - name: Extract dataset key
        id: extract
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          DATASET=$(echo $BRANCH | sed 's/auto\/spec-//')
          echo "dataset=$DATASET" >> $GITHUB_OUTPUT

      # =========================
      # Checkout CLI repo
      # =========================
      - name: Checkout CLI repo
        uses: actions/checkout@v4
        with:
          repository: KKanistan06/ballerina-connector-automation
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      # =========================
      # Setup Java 21
      # =========================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # =========================
      # Install Ballerina 2201.13.1 (STRICT)
      # =========================
      - name: Install Ballerina
        run: |
          curl -L https://dist.ballerina.io/downloads/2201.13.1/ballerina-2201.13.1-swan-lake-linux-x64.deb -o ballerina.deb
          sudo dpkg -i ballerina.deb

      - name: Verify Ballerina version
        run: bal version

      # =========================
      # Build native Java module
      # =========================
      - name: Build native Java module
        run: |
          cd modules/sdkanalyzer/native
          chmod +x gradlew
          ./gradlew build
          cd ../../..

      # =========================
      # Clean + Build CLI
      # =========================
      - name: Clean project
        run: bal clean

      - name: Build CLI
        run: bal build

      # =========================
      # Run full pipeline
      # =========================
      - name: Run connector pipeline
        run: |
          bal run -- connector ${{ steps.extract.outputs.dataset }}
          bal run -- generate-tests ${{ steps.extract.outputs.dataset }}
          bal run -- fix-code ${{ steps.extract.outputs.dataset }}
          bal run -- generate-documents generate-all ${{ steps.extract.outputs.dataset }}

      # =========================
      # Prepare connector output
      # =========================
      - name: Prepare connector output
        run: |
          if [ ! -d output/connector-generator/output ]; then
            echo "❌ Connector output not found!"
            exit 1
          fi

          mkdir connector
          cp -r output/connector-generator/output/* connector/

      # =========================
      # Checkout connector repo
      # =========================
      - name: Checkout connector repo
        uses: actions/checkout@v4
        with:
          repository: KKanistan06/generated-connectors
          token: ${{ secrets.GH_PAT }}
          path: connector-repo

      # =========================
      # Commit & push changes
      # =========================
      - name: Commit connectors
        run: |
          cp -r connector/* connector-repo/

          cd connector-repo
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          BRANCH="auto/connector-${{ steps.extract.outputs.dataset }}"
          git checkout -b $BRANCH || git checkout $BRANCH

          git add .
          git commit -m "Auto connectors for ${{ steps.extract.outputs.dataset }}" || echo "No changes"
          git push origin $BRANCH --force

      # =========================
      # Create Pull Request
      # =========================
      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_PAT }}
          commit-message: "Auto connectors for ${{ steps.extract.outputs.dataset }}"
          branch: auto/connector-${{ steps.extract.outputs.dataset }}
          title: "Connector: ${{ steps.extract.outputs.dataset }}"
          body: |
            Generated connectors after API spec merge.

            Dataset: ${{ steps.extract.outputs.dataset }}
          base: main
          path: connector-repo
