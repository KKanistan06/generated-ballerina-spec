name: Generate Connectors After Spec Merge

on:
  pull_request:
    types: [closed]

jobs:
  generate-connectors:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Extract dataset key
      # =========================
      - name: Extract dataset key
        id: extract
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          DATASET=$(echo $BRANCH | sed 's/auto\/spec-//')
          echo "dataset=$DATASET" >> $GITHUB_OUTPUT

      # =========================
      # Checkout CLI repo
      # =========================
      - name: Checkout CLI repo
        uses: actions/checkout@v4
        with:
          repository: KKanistan06/ballerina-connector-automation
          token: ${{ secrets.GH_PAT }}

      # =========================
      # Checkout spec repo (IMPORTANT)
      # =========================
      - name: Checkout spec repo
        uses: actions/checkout@v4
        with:
          repository: KKanistan06/generated-ballerina-spec
          token: ${{ secrets.GH_PAT }}
          path: spec-repo

      # =========================
      # Setup Java 21
      # =========================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # =========================
      # Install Ballerina
      # =========================
      - name: Install Ballerina
        run: |
          curl -L https://dist.ballerina.io/downloads/2201.13.1/ballerina-2201.13.1-swan-lake-linux-x64.deb -o ballerina.deb
          sudo dpkg -i ballerina.deb

      - name: Verify Ballerina
        run: bal version

      # =========================
      # Build native module
      # =========================
      - name: Build native Java module
        run: |
          cd modules/sdkanalyzer/native
          chmod +x gradlew
          ./gradlew build
          cd ../../..

      # =========================
      # 🔥 COPY REQUIRED FILES INTO CLI EXPECTED PATHS
      # =========================
      - name: Prepare dataset files
        run: |
          DATASET=${{ steps.extract.outputs.dataset }}

          echo "📦 Preparing dataset: $DATASET"

          META_PATH="spec-repo/datasets/$DATASET/metadata.json"
          IR_PATH="spec-repo/datasets/$DATASET/ir.json"

          if [ ! -f "$META_PATH" ]; then
            echo "❌ metadata.json missing!"
            exit 1
          fi

          if [ ! -f "$IR_PATH" ]; then
            echo "❌ ir.json missing!"
            exit 1
          fi

          # Create expected directories
          mkdir -p modules/sdkanalyzer/output
          mkdir -p modules/api_specification_generator/output

          # Copy files into expected CLI locations
          cp "$META_PATH" modules/sdkanalyzer/output/${DATASET}-metadata.json
          cp "$IR_PATH" modules/api_specification_generator/output/${DATASET}-ir.json

      # =========================
      # Clean + Build
      # =========================
      - name: Clean project
        run: bal clean

      - name: Build project
        run: bal build

      # =========================
      # Run pipeline
      # =========================
      - name: Run connector pipeline
        run: |
          DATASET=${{ steps.extract.outputs.dataset }}

          bal run -- connector $DATASET
          bal run -- generate-tests $DATASET
          bal run -- fix-code $DATASET
          bal run -- generate-documents generate-all $DATASET

      # =========================
      # Prepare output
      # =========================
      - name: Prepare connector output
        run: |
          mkdir connector
          cp -r output/connector-generator/output/* connector/

      # =========================
      # Checkout connector repo
      # =========================
      - name: Checkout connector repo
        uses: actions/checkout@v4
        with:
          repository: KKanistan06/generated-connectors
          token: ${{ secrets.GH_PAT }}
          path: connector-repo

      # =========================
      # Commit & push
      # =========================
      - name: Commit connectors
        run: |
          cp -r connector/* connector-repo/

          cd connector-repo
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          BRANCH="auto/connector-${{ steps.extract.outputs.dataset }}"
          git checkout -b $BRANCH || git checkout $BRANCH

          git add .
          git commit -m "Auto connectors for ${{ steps.extract.outputs.dataset }}" || echo "No changes"
          git push origin $BRANCH --force

      # =========================
      # Create PR
      # =========================
      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_PAT }}
          path: connector-repo
          branch: auto/connector-${{ steps.extract.outputs.dataset }}
          base: main
          commit-message: "Auto connectors for ${{ steps.extract.outputs.dataset }}"
          title: "Connector: ${{ steps.extract.outputs.dataset }}"
          body: |
            Generated connectors after spec merge.
            Dataset: ${{ steps.extract.outputs.dataset }}
