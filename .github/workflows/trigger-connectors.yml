name: Generate Connectors After Spec Merge

on:
  pull_request:
    types: [closed]

jobs:
  generate-connectors:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    # 🔥 REQUIRED ENV (LLM FIX)
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      PROJECT_ROOT: ${{ github.workspace }}

    steps:
      # =========================
      # Extract dataset key
      # =========================
      - name: Extract dataset key
        id: extract
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          DATASET=$(echo $BRANCH | sed 's/auto\/spec-//')
          echo "dataset=$DATASET" >> $GITHUB_OUTPUT

      # =========================
      # Checkout CLI repo
      # =========================
      - name: Checkout CLI repo
        uses: actions/checkout@v4
        with:
          repository: KKanistan06/ballerina-connector-automation
          token: ${{ secrets.GH_PAT }}
          path: cli

      # =========================
      # Checkout spec repo
      # =========================
      - name: Checkout spec repo
        uses: actions/checkout@v4
        with:
          repository: KKanistan06/generated-ballerina-spec
          token: ${{ secrets.GH_PAT }}
          path: spec

      # =========================
      # ⚡ Cache dependencies (BIG SPEED BOOST)
      # =========================
      - name: Cache Ballerina + Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.ballerina
            ~/.gradle
          key: ballerina-${{ runner.os }}-${{ hashFiles('**/*.toml') }}

      # =========================
      # Setup Java
      # =========================
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # =========================
      # Install Ballerina
      # =========================
      - name: Install Ballerina
        run: |
          curl -L https://dist.ballerina.io/downloads/2201.13.1/ballerina-2201.13.1-swan-lake-linux-x64.deb -o ballerina.deb
          sudo dpkg -i ballerina.deb

      - name: Verify Ballerina
        run: bal version

      # =========================
      # Build native module
      # =========================
      - name: Build native module
        working-directory: cli
        run: |
          cd modules/sdkanalyzer/native
          chmod +x gradlew
          ./gradlew build
          cd ../../..

      # =========================
      # Prepare dataset
      # =========================
      - name: Prepare dataset files
        run: |
          DATASET=${{ steps.extract.outputs.dataset }}

          echo "📦 Preparing dataset: $DATASET"

          mkdir -p cli/modules/sdkanalyzer/output
          mkdir -p cli/modules/api_specification_generator/IR-output
          mkdir -p cli/modules/api_specification_generator/spec-output

          cp spec/$DATASET/*metadata.json cli/modules/sdkanalyzer/output/
          cp spec/$DATASET/*ir.json cli/modules/api_specification_generator/IR-output/
          cp spec/$DATASET/${DATASET}_spec.bal cli/modules/api_specification_generator/spec-output/

          echo "📂 Metadata:"
          ls cli/modules/sdkanalyzer/output

          echo "📂 IR:"
          ls cli/modules/api_specification_generator/IR-output

          echo "📂 Spec:"
          ls cli/modules/api_specification_generator/spec-output

          echo "✅ Dataset ready"

      # =========================
      # Build CLI
      # =========================
      - name: Build CLI
        working-directory: cli
        run: |
          bal clean
          bal build

      # =========================
      # ⏱ DEBUG START TIME
      # =========================
      - name: Start timer
        run: |
          echo "⏱ START TIME:"
          date

      # =========================
      # 🚀 RUN CONNECTOR (WITH HARD TIMEOUT)
      # =========================
      - name: Run connector pipeline
        working-directory: cli
        timeout-minutes: 30   # 🔥 prevents 1h+ hanging
        run: |
          DATASET=${{ steps.extract.outputs.dataset }}

          echo "🚀 Running connector generation..."

          bal run -- connector $DATASET

          echo "🧪 Generating tests..."
          bal run -- generate-tests $DATASET

          echo "🛠 Fixing code..."
          bal run -- fix-code $DATASET

          echo "📄 Generating docs..."
          bal run -- generate-documents generate-all $DATASET

      # =========================
      # ⏱ DEBUG END TIME
      # =========================
      - name: End timer
        run: |
          echo "⏱ END TIME:"
          date

      # =========================
      # Prepare output
      # =========================
      - name: Prepare connector output
        run: |
          mkdir connector
          cp -r cli/output/connector-generator/output/* connector/

      # =========================
      # Create PR
      # =========================
      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_PAT }}
          commit-message: "Auto connectors for ${{ steps.extract.outputs.dataset }}"
          branch: auto/connector-${{ steps.extract.outputs.dataset }}
          title: "Connector: ${{ steps.extract.outputs.dataset }}"
          body: "Generated connectors after spec merge"
          base: main
          path: connector/
          repository: KKanistan06/generated-connectors
